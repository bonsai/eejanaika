<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ええじゃないか — 白楽散歩</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="sub-page">
  <div class="app">
    <header>
      <div class="event-banner">
        <a href="index.html" class="back-btn">←</a>
        <div class="event-title">白楽散歩</div>
        <div class="event-date">16:00 – 17:00</div>
      </div>
    </header>

    <main>
      <div class="sanpo-content">
        <div class="sanpo-info">
          <div class="sanpo-route">白楽駅 → まちだ図書館 → 広尾橋 → サイダーバー白楽</div>
          <div class="sanpo-detail">
            <div class="sanpo-row"><span class="sanpo-label">集合</span><span class="sanpo-val">16:00 白楽駅改札前</span></div>
            <div class="sanpo-row"><span class="sanpo-label">出発</span><span class="sanpo-val">16:05</span></div>
            <div class="sanpo-row"><span class="sanpo-label">到着</span><span class="sanpo-val">17:00 サイダーバー白楽</span></div>
            <div class="sanpo-row"><span class="sanpo-label">距離</span><span class="sanpo-val">約2.5km</span></div>
            <div class="sanpo-row"><span class="sanpo-label">難易度</span><span class="sanpo-val">★☆☆ 誰でも</span></div>
          </div>
        </div>

        <div class="sanpo-checklist">
          <div class="sanpo-check-title">持ち物チェック</div>
          <label class="sanpo-check"><input type="checkbox"><span>水分（500ml以上）</span></label>
          <label class="sanpo-check"><input type="checkbox"><span>帽子</span></label>
          <label class="sanpo-check"><input type="checkbox"><span>日焼け止め</span></label>
          <label class="sanpo-check"><input type="checkbox"><span>歩きやすい靴</span></label>
          <label class="sanpo-check"><input type="checkbox"><span>スマートフォン</span></label>
          <label class="sanpo-check"><input type="checkbox"><span>財布・ICカード</span></label>
        </div>

        <div class="sanpo-map">
          <a href="https://maps.google.com/?q=横浜市神奈川区白楽" class="map-card g-showa" target="_blank">
            <div class="map-name">ルートマップ</div>
            <div class="map-go">Google Maps →</div>
          </a>
        </div>
      </div>
    </main>

    <footer>
      <div class="footer-row">
        <div class="end">
          <span>次のイベント 17:00 から</span>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
