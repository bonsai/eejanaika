<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ええじゃないか — フライヤー</title>
<link rel="stylesheet" href="style.css">
<style>
  .flyer-page { padding: 0.5rem; }
  .flyer-img {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 1rem;
  }
  .flyer-info {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1rem;
  }
  .flyer-info h2 {
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;
    background: linear-gradient(90deg, var(--g-trance), var(--g-anime), var(--g-hiphop), var(--g-showa));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .flyer-detail {
    font-size: 0.75rem;
    color: var(--text-dim);
    line-height: 1.8;
  }
  .flyer-detail strong {
    color: var(--text);
  }
  .flyer-artists {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.6rem;
  }
  .artist-tag {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.2rem 0.6rem;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text);
  }
  .back-link {
    display: block;
    text-align: center;
    color: var(--g-trance);
    text-decoration: none;
    font-size: 0.75rem;
    padding: 0.5rem;
  }
</style>
</head>
<body class="sub-page">
  <div class="app">
    <header>
      <div class="event-banner">
        <a href="index.html" class="back-btn">&larr;</a>
        <div class="event-title">ええじゃないか</div>
        <div class="event-date">2026/08/02</div>
      </div>
    </header>

    <main>
      <div class="flyer-page">
        <div class="flyer-info">
          <h2>オールジャンルダンスパーティー</h2>
          <div class="flyer-detail">
            <strong>日時</strong> 2026年8月2日（日）17:00開始<br>
            <strong>入場料</strong> ¥1,000<br>
            <strong>会場</strong> CAFE doudou<br>
            神奈川県横浜市神奈川区白楽100-11-103<br>
            <strong>ジャンル</strong> トランス、パンク、ロック、<br>ヒップホップ、ワールド、グルーブ歌謡、<br>なんでもありのダンスパーティー
          </div>
          <div class="flyer-artists">
            <span class="artist-tag">TOMSUCK</span>
            <span class="artist-tag">あなるちゃん</span>
            <span class="artist-tag">ALKA</span>
            <span class="artist-tag">haraken</span>
            <span class="artist-tag">オレンジさん</span>
            <span class="artist-tag">ビストロムッシュ</span>
            <span class="artist-tag">おしゃれどろぼう</span>
          </div>
        </div>

        <a href="index.html" class="back-link">← トップに戻る</a>
      </div>
    </main>

    <footer>
      <div class="footer-row">
        <div class="end">
          <span>17:00 – 22:00</span>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
