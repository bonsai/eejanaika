<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイムテーブル 7/13</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  h1 {
    text-align: center;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    margin-bottom: 2rem;
    color: #f0f0f0;
  }
  .timetable {
    max-width: 480px;
    margin: 0 auto;
  }
  .row {
    display: flex;
    align-items: center;
    padding: 1rem 0;
    border-bottom: 1px solid #2a2a2a;
  }
  .time {
    width: 100px;
    font-size: 0.85rem;
    color: #888;
    font-variant-numeric: tabular-nums;
  }
  .artist {
    flex: 1;
    font-size: 1.05rem;
    font-weight: 500;
  }
  .dur {
    width: 60px;
    text-align: right;
    font-size: 0.8rem;
    color: #666;
  }
  .row.highlight {
    background: rgba(255,255,255,0.03);
  }
  .row.highlight .artist {
    color: #ff9f43;
  }
  .row.empty .artist {
    color: #555;
    font-style: italic;
  }
  .footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.8rem;
    color: #555;
  }
  .end-time {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 1rem;
    color: #aaa;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<h1>タイムテーブル</h1>
<div class="timetable">
  <div class="row">
    <div class="time">17:00-17:15</div>
    <div class="artist">おしゃれどろぼう</div>
    <div class="dur">15分</div>
  </div>
  <div class="row">
    <div class="time">17:15-18:00</div>
    <div class="artist">モリー</div>
    <div class="dur">45分</div>
  </div>
  <div class="row highlight">
    <div class="time">18:00-19:00</div>
    <div class="artist">トムサック</div>
    <div class="dur">60分</div>
  </div>
  <div class="row">
    <div class="time">19:00-19:45</div>
    <div class="artist">アルカ</div>
    <div class="dur">45分</div>
  </div>
  <div class="row">
    <div class="time">19:45-20:30</div>
    <div class="artist">オレンジさん</div>
    <div class="dur">45分</div>
  </div>
  <div class="row">
    <div class="time">20:30-21:15</div>
    <div class="artist">ムッシュ</div>
    <div class="dur">45分</div>
  </div>
  <div class="row empty">
    <div class="time">未定</div>
    <div class="artist">ピクシー</div>
    <div class="dur">—</div>
  </div>
</div>
<div class="end-time">終了 21:15</div>
<div class="footer">転換5分含む</div>
</body>
</html>
