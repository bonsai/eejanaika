<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title></title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="loader" id="loader"><div class="loader-spin"></div></div>
  <div class="app">
    <header>
      <div class="header-inner">
        <button class="mode-toggle" id="modeToggle" title="LP/SPA切替">⤡</button>
        <div>
          <div class="event-title" id="headerTitle"></div>
          <div class="event-date" id="headerDate"></div>
        </div>
      </div>
    </header>

    <main id="main">
      <div id="lp-mode" class="lp">
        <section class="lp-hero">
          <img class="hero-flyer" id="lpFlyer" alt="">
        </section>
        <section class="lp-section lp-toptitle">
          <div class="top-title" id="lpTopTitle">ええじゃないか４</div>
        </section>
        <section class="lp-section" id="lpCopy" style="display:none">
          <div class="copy-card" id="lpCopyContent"></div>
        </section>
        <section class="lp-section">
          <div class="section-title"><span class="section-marker g-anime"></span> イベント詳細</div>
          <div class="detail-card" id="lpDetails"></div>
        </section>
        <section class="lp-section">
          <div class="section-title"><span class="section-marker g-trance"></span> タイムテーブル</div>
          <div class="tt-wrapper">
            <ul id="ttList" class="tl-list"></ul>
            <div class="tt-end" id="ttEndTime"></div>
          </div>
        </section>
        <section class="lp-section">
          <div class="section-title"><span class="section-marker g-prog"></span> メンバーリンク</div>
          <div class="member-strip" id="memberStrip"></div>
        </section>
        <section class="lp-section">
          <div class="section-title"><span class="section-marker g-city"></span> SNS用テキスト（コピペOK）</div>
          <div class="sns-card">
            <textarea id="snsText" class="sns-textarea" readonly rows="20"></textarea>
            <button type="button" id="snsCopyBtn" class="sns-copy-btn">コピーする</button>
          </div>
        </section>
        <section class="lp-section">
          <div class="section-title"><span class="section-marker g-anime"></span> フライヤー（もう一枚）</div>
          <img class="hero-flyer" id="lpFlyer2" alt="">
        </section>
        <section class="lp-section" style="text-align:center">
          <a href="hakuraku.html" class="hk-back" style="font-size:0.95rem; padding:3% 6%">🚶 白楽散歩を見る</a>
        </section>
      </div>

      <div id="spa-mode" style="display:none" class="spa">
        <section id="page-top" class="page">
          <div class="nav-grid" id="spaNavGrid"></div>
        </section>
        <section id="page-flyer" class="page" style="display:none">
          <img class="flyer-img" id="spaFlyer" alt="">
          <div class="flyer-info" id="spaFlyerInfo"></div>
        </section>
        <section id="page-timetable" class="page" style="display:none">
          <ul id="ttListSpa" class="tl-list"></ul>
          <div class="tt-end" id="ttEndTimeSpa"></div>
        </section>
        <section id="page-members" class="page" style="display:none">
          <div class="members-grid" id="membersGrid"></div>
        </section>
        <section id="page-sanpo" class="page" style="display:none">
          <div class="sanpo-content" id="spaSanpo"></div>
        </section>
      </div>
    </main>

    <footer>
      <div class="footer-row"><div class="end" id="footerTitle"></div></div>
    </footer>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
