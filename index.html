<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title data-key="title">ええじゃないか</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js" defer></script>
</head>
<body>
  <div class="app">
    <header>
      <div class="event-banner" id="headerBanner">
        <a href="#top" class="back-btn" id="backBtn" style="display:none">&larr;</a>
        <div class="event-title" id="headerTitle">ええじゃないか</div>
        <div class="event-date" id="headerDate">2026/08/02</div>
      </div>
    </header>

    <main id="main">

      <section id="page-top" class="page"></section>

      <section id="page-flyer" class="page" style="display:none"></section>

      <section id="page-members" class="page" style="display:none"></section>

      <!-- ========== TIMETABLE VIEWER ========== -->
      <section id="page-timetable" class="page" style="display:none">
        <ul id="ttList" class="tl-list"></ul>
        <div class="tt-end" id="ttEndTime"></div>
      </section>

      <!-- ========== TIMETABLE EDITOR ========== -->
      <section id="page-editor" class="page" style="display:none">
        <ul id="edList" class="tl-list"></ul>
        <div class="tt-footer">
          <div class="tt-end">終了 <span id="edEndTime">--:--</span></div>
          <button id="edAddBtn" class="add-btn">＋</button>
        </div>
      </section>

      <section id="page-sanpo" class="page" style="display:none"></section>

      <!-- ========== EQUIPMENT ========== -->
      <section id="page-equipment" class="page" style="display:none">
        <div id="equipmentList"></div>
      </section>

      <section id="page-maps" class="page" style="display:none"></section>

    </main>

    <footer>
      <div class="footer-row" id="footerRow">
        <div class="end"><span>17:00 – 22:00</span></div>
      </div>
    </footer>
  </div>

  <script>
  let ev; // current event config
  let ttData;

  const TT_KEY = 'eejanaika_tt_v3';

  function hmToMin(hm) { const [h,m]=hm.split(':').map(Number); return h*60+m; }
  function minToHm(m) { return String(Math.floor(m/60)%24).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
  function addMin(hm,a) { return minToHm(hmToMin(hm)+a); }
  function genreClass(g) {
    const map={'トランス':'g-trance','プログレ':'g-prog','アニメーション':'g-anime','パンク':'g-punk','ヒップホップ':'g-hiphop','昭和歌謡':'g-showa','おしゃれ':'g-oshare'};
    return map[g]||'g-other';
  }

  function renderTop() {
    const el = document.getElementById('page-top');
    const d = ev;
    const artists = d.members.map(m => m.name.replace(/\(.*\)/,'').trim()).join(', ');
    el.innerHTML =
      '<div class="event-info">'+
        '<h2>イベント情報</h2>'+
        '<p>日時: '+d.date+'（日）'+d.time+'</p>'+
        '<p>場所: '+d.location+'</p>'+
        '<p>参加費 '+d.admission+'</p>'+
      '</div>'+
      '<div class="section-title">メインコンテンツ</div>'+
      '<div class="index-grid">'+
        '<a href="#flyer" class="index-card g-anime"><div class="index-icon">&#127912;</div><div class="index-label">フライヤー</div><div class="index-sub">ダンスパーティー情報</div></a>'+
        '<a href="#members" class="index-card g-trance"><div class="index-icon">&#128101;</div><div class="index-label">メンバー</div><div class="index-sub">紹介</div></a>'+
        '<a href="#timetable" class="index-card g-prog"><div class="index-icon">&#9201;</div><div class="index-label">タイムテーブル</div><div class="index-sub">スケジュール確認</div></a>'+
        '<a href="#editor" class="index-card g-punk"><div class="index-icon">&#9998;</div><div class="index-label">エディタ</div><div class="index-sub">タイムテーブル編集</div></a>'+
      '</div>'+
      '<div class="section-title">イベント准备</div>'+
      '<div class="index-grid">'+
        (d.sanpo?'<a href="#sanpo" class="index-card g-showa"><div class="index-icon">&#128694;</div><div class="index-label">散歩</div><div class="index-sub">'+d.sanpo.departure+'</div></a>':'')+
        '<a href="#equipment" class="index-card g-hiphop"><div class="index-icon">&#127899;</div><div class="index-label">機材リスト</div><div class="index-sub">全店舗の機材</div></a>'+
        '<a href="#maps" class="index-card g-showa"><div class="index-icon">&#128205;</div><div class="index-label">店舗マップ</div><div class="index-sub">会場</div></a>'+
      '</div>';
  }

  function renderFlyer() {
    const el = document.getElementById('page-flyer');
    const d = ev;
    const artists = d.members.map(m => {
      const n = m.name.replace(/\(.*\)/,'').trim();
      const g = m.genre;
      return '<span class="artist-tag" style="border-color:var(--g-'+genreClass(g).slice(2)+')">'+n+'</span>';
    }).join('');
    el.innerHTML =
      '<div class="flyer-page">'+
        (d.flyerImage?'<img src="'+d.flyerImage+'" alt="flyer" style="width:100%;border-radius:8px;margin-bottom:12px">':'')+
        '<div class="flyer-info"><h2>オールジャンルダンスパーティー</h2>'+
          '<div class="flyer-detail">'+
            '<strong>日時</strong> '+d.date+'（日）'+d.time+'<br>'+
            '<strong>入場料</strong> '+d.admission+'<br>'+
            '<strong>会場</strong> '+d.venues[0].name+'<br>'+
            d.venues[0].address+'<br>'+
          '</div>'+
          '<div class="flyer-artists">'+artists+'</div>'+
        '</div>'+
        '<div class="flyer-info"><h2>アクセス</h2>'+
          '<div class="flyer-detail">'+
            '<strong>Map</strong> <a href="'+d.venues[0].mapUrl+'" target="_blank" style="color:var(--g-trance)">Google Maps</a>'+
          '</div>'+
        '</div>'+
        (d.flyerNotes ? '<div class="flyer-info"><h2>持ち物・注意事項</h2><div class="flyer-detail">'+d.flyerNotes.map(n=>'&#8226; '+n).join('<br>')+'</div></div>' : '')+
      '</div>';
  }

  function renderMembers() {
    const el = document.getElementById('page-members');
    el.innerHTML = '<div class="members-grid">'+
      ev.members.map(m => {
        const gc = genreClass(m.genre);
        const links = m.links.map(l => '<a href="'+l.url+'" target="_blank" style="border-left:2px solid var(--'+gc+');padding-left:6px">'+l.label+'</a>').join('');
        return '<div class="member-card">'+
          '<h2>'+m.name+'</h2>'+
          '<div class="genre" style="color:var(--'+gc+')">'+m.genre+'</div>'+
          links+
          (m.bio?'<div class="bio">'+m.bio+'</div>':'')+
        '</div>';
      }).join('')+
    '</div>';
  }

  function renderSanpo() {
    const el = document.getElementById('page-sanpo');
    const s = ev.sanpo;
    if (!s) { el.innerHTML=''; return; }
    const checkItems = s.checklist.map(c =>
      '<label class="sanpo-check"><input type="checkbox"><span>'+c+'</span></label>'
    ).join('');
    el.innerHTML =
      '<div class="sanpo-content">'+
        '<div class="sanpo-info">'+
          '<div class="sanpo-route">'+s.route+'</div>'+
          '<div class="sanpo-detail">'+
            '<div class="sanpo-row"><span class="sanpo-label">集合</span><span class="sanpo-val">'+s.meeting+'</span></div>'+
            '<div class="sanpo-row"><span class="sanpo-label">出発</span><span class="sanpo-val">'+s.departure+'</span></div>'+
            '<div class="sanpo-row"><span class="sanpo-label">到着</span><span class="sanpo-val">'+s.arrival+'</span></div>'+
            '<div class="sanpo-row"><span class="sanpo-label">距離</span><span class="sanpo-val">'+s.distance+'</span></div>'+
            '<div class="sanpo-row"><span class="sanpo-label">難易度</span><span class="sanpo-val">'+s.difficulty+'</span></div>'+
          '</div>'+
        '</div>'+
        '<div class="sanpo-checklist">'+
          '<div class="sanpo-check-title">持ち物チェック</div>'+checkItems+
        '</div>'+
        '<a href="'+ev.mapUrl+'" class="map-card g-showa" target="_blank"><div class="map-name">ルートマップ</div><div class="map-go">Google Maps →</div></a>'+
      '</div>';
  }

  function renderMaps() {
    const el = document.getElementById('page-maps');
    el.innerHTML = '<div class="map-list">'+
      ev.venues.map((v,i) => {
        const cls = ['g-trance','g-anime','g-hiphop','g-showa','g-punk'][i%5];
        return '<a href="'+v.mapUrl+'" class="map-card '+cls+'" target="_blank">'+
          '<div class="map-name">'+v.name+'</div>'+
          (v.address?'<div class="map-addr">'+v.address+'</div>':'')+
          '<div class="map-go">Google Maps →</div></a>';
      }).join('')+
    '</div>';
  }

  const pages = ['top','flyer','members','timetable','editor','sanpo','equipment','maps'];

  function navigate(hash) {
    const id = (hash||'top').replace('#','');
    if (!pages.includes(id)) return location.hash='#top';
    document.querySelectorAll('.page').forEach(p=>p.style.display='none');
    const target = document.getElementById('page-'+id);
    if (target) target.style.display='';
    const title = id==='top' ? ev.title : (id==='flyer' ? 'フライヤー' : id==='members' ? 'メンバー' : id==='timetable' ? 'タイムテーブル' : id==='editor' ? 'タイムテーブル' : id==='sanpo' ? '散歩' : id==='equipment' ? '機材リスト' : '店舗マップ');
    const sub = id==='top' ? ev.date : id==='members' ? ev.members.length+'名のDJ' : '';
    document.getElementById('headerTitle').textContent = title;
    document.getElementById('headerDate').textContent = sub || ev.date;
    document.getElementById('backBtn').style.display = id==='top' ? 'none' : '';
    document.getElementById('main').scrollTop = 0;
    document.querySelector('title').textContent = ev.title+' - '+title;
    if (id==='timetable') renderViewer();
    if (id==='editor') renderEditor();
    if (id==='equipment') renderEquipment();
  }
  window.addEventListener('hashchange',()=>navigate(location.hash));
  document.getElementById('backBtn').addEventListener('click',e=>{e.preventDefault();location.hash='#top';});

  async function loadTT() {
    try {
      const r=await fetch(ev.file);
      const j=await r.json();
      ttData = { baseTime: j.baseTime, items: j.schedule || [] };
    } catch(e){ ttData = { baseTime: '17:00', items: [] }; }
    const raw=localStorage.getItem(TT_KEY);
    if (raw) ttData=JSON.parse(raw);
  }
  function saveTT() { localStorage.setItem(TT_KEY,JSON.stringify(ttData)); }

  function renderViewer() {
    const el = document.getElementById('ttList');
    el.innerHTML = '';
    let cursor = ttData.baseTime;
    ttData.items.forEach(item => {
      const li = document.createElement('li');
      li.className = 'tl-item '+(item.idx%2===0?'left':'right');
      const gc = genreClass(item.genre);
      const st = cursor;
      const et = item.duration!=null ? addMin(st,item.duration) : '—';
      li.innerHTML = '<div class="tl-dot '+gc+'"></div><div class="tl-conn"></div><div class="tl-card '+gc+'">'
        +'<div class="tl-time">'+st+' – '+et+'</div>'
        +'<div class="tl-name-view">'+item.name+'</div>'
        +'<div class="tl-genre '+gc+'">'+item.genre+'</div>'
        +'<div class="tl-dur"><span>'+(item.duration!=null?item.duration:'—')+'分</span></div>'
        +'</div>';
      el.appendChild(li);
      if (item.duration!=null) cursor=addMin(cursor,item.duration);
      item.idx = (item.idx||0)+1;
    });
    document.getElementById('ttEndTime').textContent = '終了 '+cursor;
  }

  let edSortable;
  function renderEditor() {
    const el = document.getElementById('edList');
    el.innerHTML = '';
    let cursor = ttData.baseTime;
    ttData.items.forEach((item,idx)=>{
      const side = idx%2===0?'left':'right';
      const gc = genreClass(item.genre);
      const st = cursor;
      const et = item.duration!=null?addMin(st,item.duration):'—';
      const li = document.createElement('li');
      li.className = 'tl-item '+side+' '+gc;
      li.innerHTML = '<div class="tl-dot '+gc+'"></div><div class="tl-conn"></div><div class="tl-card">'
        +'<div class="tl-time">'+st+' – '+et+'</div>'
        +'<input class="tl-name" type="text" value="'+item.name+'" spellcheck="false">'
        +'<div class="tl-dur"><input type="number" value="'+(item.duration!=null?item.duration:'')+'" min="0"><span>分</span></div>'
        +'<button class="tl-del">&times;</button>'
        +'</div>';
      el.appendChild(li);
      li.querySelector('.tl-name').addEventListener('change',function(){ttData.items[idx].name=this.value||'無名';saveTT();renderEditor();});
      li.querySelector('.tl-dur input').addEventListener('change',function(){const v=this.value.trim();ttData.items[idx].duration=v===''?null:Math.max(0,parseInt(v,10)||0);saveTT();renderEditor();});
      li.querySelector('.tl-del').addEventListener('click',()=>{ttData.items.splice(idx,1);saveTT();renderEditor();});
      if (item.duration!=null) cursor=addMin(cursor,item.duration);
    });
    document.getElementById('edEndTime').textContent = cursor;
    if (edSortable) edSortable.destroy();
    edSortable = new Sortable(el,{
      handle:'.tl-card',animation:120,delay:100,delayOnTouchOnly:true,ghostClass:'tl-ghost',dragClass:'tl-drag',
      onEnd:evt=>{if(evt.oldIndex===evt.newIndex)return;const[m]=ttData.items.splice(evt.oldIndex,1);ttData.items.splice(evt.newIndex,0,m);saveTT();renderEditor();}
    });
  }
  document.getElementById('edAddBtn').addEventListener('click',()=>{ttData.items.push({name:'新規',duration:45,genre:''});saveTT();renderEditor();});

  let eqLoaded = false;
  async function renderEquipment() {
    if (eqLoaded) return;
    try {
      const res = await fetch('data/equipment.json');
      const data = await res.json();
      const list = document.getElementById('equipmentList');
      data.stores.forEach(store => {
        const sec = document.createElement('div');
        sec.className = 'store-section';
        sec.innerHTML = '<div class="store-header">'+store.name+'</div>';
        const grid = document.createElement('div');
        grid.className = 'equip-grid';
        const cats = [
          {key:'dj',label:'DJ',cls:'g-trance',items:store.equipment.dj},
          {key:'speaker',label:'スピーカー',cls:'g-anime',items:store.equipment.speaker},
          {key:'projector',label:'プロジェクター',cls:'g-hiphop',items:store.equipment.projector},
          {key:'lighting',label:'照明',cls:'g-showa',items:store.equipment.lighting},
          {key:'other',label:'その他',cls:'g-other',items:store.equipment.other}
        ];
        cats.forEach(cat=>{
          if(!cat.items) return;
          const card = document.createElement('div');
          card.className = 'equip-card '+cat.cls;
          card.innerHTML = '<div class="equip-cat">'+cat.label+'</div>';
          if(cat.key==='projector') {
            const p=cat.items;
            card.innerHTML += p.available
              ? '<div class="equip-row"><span class="equip-val">'+p.model+'</span></div>'+(p.screen?'<div class="equip-row"><span class="equip-val sub">'+p.screen+'</span></div>':'')
              : '<div class="equip-row"><span class="equip-val dim">なし</span></div>';
          } else {
            Object.entries(cat.items).forEach(([k,v])=>{if(v===null)return;card.innerHTML+='<div class="equip-row"><span class="equip-key">'+k+'</span><span class="equip-val">'+v+'</span></div>';});
          }
          grid.appendChild(card);
        });
        sec.appendChild(grid);
        list.appendChild(sec);
      });
      eqLoaded = true;
    } catch(e) { document.getElementById('equipmentList').innerHTML='<p style="padding:2rem;text-align:center;color:#666">読み込み中...</p>'; }
  }

  (async () => {
    try {
      const r = await fetch('data/events.json');
      const events = await r.json();
      const hash = location.hash;
      const m = hash.match(/ev=([^&]+)/);
      const evId = m ? m[1] : events.events[0].id;
      const cfg = events.events.find(e => e.id === evId);
      if (!cfg) { ev = events.events[0]; } else { ev = cfg; }
    } catch(e) { ev = { title:'ええじゃないか', date:'2026/08/02', time:'17:00 – 22:00', location:'白楽エリア', admission:'¥1000', file:'data/20260802.json', venues:[], members:[] }; }
    document.getElementById('headerTitle').textContent = ev.title;
    document.getElementById('headerDate').textContent = ev.date;
    document.querySelector('title').textContent = ev.title;
    renderTop();
    renderFlyer();
    renderMembers();
    renderSanpo();
    renderMaps();
    await loadTT();
    navigate(location.hash);
  })();
  </script>
</body>
</html>
